<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Music Producer — Démo Phase 1</title>
  <style>
    :root { --bg:#0e0f13; --panel:#171922; --accent:#7c5cff; --accent2:#23d1a0; --text:#e8e9ef; --muted:#8a8d9a; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1c1e2b, var(--bg)); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card { width: min(760px, 100%); background: var(--panel); border: 1px solid #232634;
      border-radius: 18px; padding: 28px 28px 32px; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
    h1 { font-size: 20px; margin: 0 0 2px; letter-spacing: .2px; }
    #meta { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .controls { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
    #play { cursor: pointer; border: none; border-radius: 999px; padding: 14px 26px; font-size: 16px;
      font-weight: 600; color: #fff; background: linear-gradient(135deg, var(--accent), #5a3cff);
      transition: transform .08s ease, filter .2s ease; }
    #play:hover { filter: brightness(1.08); }
    #play:active { transform: scale(.97); }
    #play.on { background: linear-gradient(135deg, #ff5c7c, #ff3c5a); }
    .hint { color: var(--muted); font-size: 12.5px; }
    .timeline { display: flex; gap: 6px; margin: 8px 0 18px; height: 64px; }
    .section { flex: 1; background: #1f2230; border: 1px solid #2a2e40; border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; transition: all .25s ease; min-width: 0; }
    .section .name { font-size: 12.5px; font-weight: 600; text-transform: capitalize; color: var(--muted); }
    .section .bars { font-size: 10.5px; color: #5d6170; }
    .section.active { background: linear-gradient(180deg, #2b2550, #221d44);
      border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(124,92,255,.25); }
    .section.active .name { color: #fff; }
    .energy { margin-top: 6px; }
    .energy .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; letter-spacing: .4px; text-transform: uppercase; }
    .energy .bar { height: 8px; background: #1f2230; border-radius: 999px; overflow: hidden; border: 1px solid #2a2e40; }
    #energy-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .4s ease; }
    .foot { margin-top: 22px; font-size: 12px; color: #5d6170; line-height: 1.6; }
    code { background: #1f2230; padding: 1px 6px; border-radius: 5px; color: #b9bdd0; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Music Producer</h1>
    <div id="meta">…</div>

    <div class="controls">
      <button id="play">▶ Play</button>
      <span class="hint">Mets le son, monte le volume. Critère&nbsp;: est-ce que ça donne envie de bouger la tête&nbsp;?</span>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="energy">
      <div class="label">Énergie de la section</div>
      <div class="bar"><div id="energy-fill"></div></div>
    </div>

    <div class="foot">
      Tout le morceau est décrit dans l'objet <code>ARRANGEMENT</code> de <code>app.js</code> — c'est le contrat éditable.
      Pour brancher tes propres samples de batterie&nbsp;: voir <code>samples/README.md</code>.
    </div>
  </div>

  <!-- Tone.js (moteur Web Audio) via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="app.js"></script>
</body>
</html>
